apiVersion: v1
kind: Secret
metadata:
  name: showcase-api-secret
  labels:
    app: showcase-api
type: Opaque
data:
  # Sensitive data must be base64 encoded in Kubernetes secrets
  # echo -n "showcase_user" | base64 -> c2hvd2Nhc2VfdXNlcg==
  DB_USER: c2hvd2Nhc2VfdXNlcg==
  
  # echo -n "secure_password" | base64 -> c2VjdXJlX3Bhc3N3b3Jk
  DB_PASSWORD: c2VjdXJlX3Bhc3N3b3Jk
